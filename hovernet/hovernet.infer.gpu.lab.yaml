---
apiVersion: batch/v1
kind: Job
metadata:
  name: xpan7-hovernet-infer4-transneo{{index}}
  namespace: yn-gpu-workload
  labels:
      k8s-user: xpan7
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 60
  template:
    spec:
      nodeSelector:
        "nvidia.com/gpu.present": "true"
      securityContext:
        runAsUser: 290361
        runAsGroup: 1944271327
        fsGroup: 1944271327
        supplementalGroups: 
          - 1944303352
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: '21474836480'
        - name: lab
          persistentVolumeClaim:
            claimName: xpan7-gpu-lab
        - name: home
          persistentVolumeClaim:
            claimName: xpan7-gpu-home
        - name: program
          persistentVolumeClaim:
            claimName: xpan7-gpu-rsrch9-home-plm
      containers:
        - name: main
          image: hpcharbor.mdanderson.edu/xpan7/tiatool:xpan7
          command: ["python", "/rsrch5/home/trans_mol_path/xpan7/pipelines/artemis/hovernet/main_hovernet.py"]
          args: [
            "-d", "/rsrch6/home/trans_mol_path/yuan_lab/TIER1/artemis_lei/TransNeo_Nature",
            "-o", "/rsrch6/home/trans_mol_path/yuan_lab/TIER2/artemis_lei/TransNeo_Nature/hovernet",
            "-p", "73226*.svs", "-n", "{{index}}", "-nJ", "7"
            ]
          workingDir: "/rsrch5/home/trans_mol_path/xpan7"
          env:
          - name: HOME
            value: "/rsrch5/home/trans_mol_path/xpan7"
          volumeMounts:
            - name: lab
              mountPath: "/rsrch6/home/trans_mol_path/yuan_lab"
            - name: home
              mountPath: "/rsrch5/home/trans_mol_path/xpan7"
            - name: program
              mountPath: "/rsrch9/home/plm/idso_fa1_pathology"
          resources:
            requests:
              nvidia.com/gpu: "1"
            limits:
              nvidia.com/gpu: "1"
          imagePullPolicy: IfNotPresent
      restartPolicy: Never

